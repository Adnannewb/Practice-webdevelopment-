<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark & Light Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body >
    <div>
        <Label for="full-dark-mode">Dark Mode: </Label>
        <input type="checkbox" id="full-dark-mode">
    </div>
    <h1>Full Body Dark and Light mode</h1>
    <div >
        <Label for="container-dark-mode">Container Dark Mode: </Label>
        <input type="checkbox" id="container-dark-mode">
    </div>
    <div class="container">
        <h1>This is container Dark and Light Mode</h1>
    </div>
    <script src="script.js"></script>
</body>
</html>
