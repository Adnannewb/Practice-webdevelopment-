<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tool Tips</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="tooltips-container">
      <div class="tooltips-icon mongodb">
        <img src="Mongodb.svg" alt="MongoDB" />
        <span >M</span>
        <div class="tooltip"><span>mongoDB</span></div>
      </div>
      <div class="tooltips-icon express">
        <img src="Express.svg" alt="Express" />
        <span >E</span>
        <div class="tooltip"><span>Express.JS</span></div>
      </div>
      <div class="tooltips-icon react">
        <img src="React.svg" alt="React" />
        <span >R</span>
        <div class="tooltip"><span>React.JS</span></div>
      </div>
      <div class="tooltips-icon node">
        <img src="Node.svg" alt="Node.js" />
        <span >N</span>
        <div class="tooltip"><span>Node.JS</span></div>
      </div>
    </div>
  </body>
</html>
