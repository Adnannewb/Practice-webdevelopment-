<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Guessing Game</h1>
        <form class="game-form">
            <label for="number">Enter a Number between 1 to 100</label>
            <input type="number" id="number" placeholder="Enter Your Number" min="1" max="100" required>
            <div>
                <button type="submit" class="submit">Submit</button>
                <button type="button" class="start-game" disabled>Start Game</button>
            </div>
        </form>
        <p class="result"></p>
        <p class="your-guesses">Your Guesses: <span class="all-guesses"></span> </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
