<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E commerce Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
        <div class="card-container">
      <div class="circle circle1"></div>
      <div class="circle circle2"></div>
      <div class="circle circle3"></div>
      <div class="card">
        <div class="card-content">
          <img
            class="card-img"
            src="javascript course 1.png"
            alt="content image"
          />
          <div class="card-nonimg">
            <div class="card-beginer">
              <div class="beginner">Beginner</div>
              <img src="Vector 1 (Stroke).svg" alt="Heart Icon" />
            </div>
            <h2 class="card-title">
              The Complete JavaScript Course Zero to Advanced
            </h2>
            <p class="card-subtittle">By: Anurag Singh</p>
            <div class="star-rating">
                <img src="Star Rating.png" alt="Star Rating">
                <span class="rating">4.8</span>
                <span class="voting">(3,327)</span>
          </div>
          <button class="card-btn">
            <img src="Vector.png" alt="Add to Cart Icon" />
            <span class="btn-text">Get Enrolled</span>
          </button>
        </div>
      </div>
    </div>
    </main>
  </body>
</html>
