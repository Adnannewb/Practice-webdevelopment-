<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SVG → JPG Exporter</title>
  <style>
    :root{--bg:#0B1020;--fg:#E6ECFF;--muted:#A4B5FF;--accent:#7FD1FF}
    body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;color:var(--fg);background:radial-gradient(1000px 600px at 15% 10%,rgba(127,209,255,.15),transparent 60%),radial-gradient(800px 500px at 90% 30%,rgba(227,125,255,.12),transparent 60%),var(--bg)}
    .wrap{max-width:800px;margin:40px auto;padding:24px 20px}
    .card{background:#0F1530;border:1px solid #273057;border-radius:14px;padding:20px}
    .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin:12px 0}
    input[type="number"]{width:120px;padding:8px;border-radius:8px;border:1px solid #273057;background:#0B1020;color:var(--fg)}
    input[type="range"]{width:200px}
    .drop{border:2px dashed #273057;border-radius:12px;padding:24px;text-align:center;color:#C9D3FF}
    .btn{background:var(--accent);color:#0A1020;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .meta{color:#C9D3FF}
    .pill{display:inline-block;background:#0B1020;border:1px solid #273057;border-radius:999px;padding:6px 10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Export your Figma-ready SVG to JPG</h2>
      <p class="meta">Drop portfolio-solar-wireframe.svg below, set output width and quality, then download a .jpg.</p>
      <div class="drop" id="drop">
        <p>Drop SVG here or click to pick a file</p>
        <input id="file" type="file" accept=".svg,image/svg+xml" style="display:none"/>
      </div>
      <div class="row">
        <label class="pill">Width (px): <input id="w" type="number" value="1920" min="600" step="10"/></label>
        <label class="pill">Quality: <input id="q" type="range" min="0.5" max="1" step="0.05" value="0.9"/></label>
        <button class="btn" id="go">Download JPG</button>
      </div>
      <div class="meta" id="info"></div>
      <canvas id="c" style="display:none"></canvas>
    </div>
  </div>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const widthInput = document.getElementById('w');
    const qInput = document.getElementById('q');
    const btn = document.getElementById('go');
    const info = document.getElementById('info');
    const canvas = document.getElementById('c');
    let svgText = '', svgW = 3000, svgH = 1900;

    const pick = () => fileInput.click();
    drop.addEventListener('click', pick);
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = '#7FD1FF'; });
    drop.addEventListener('dragleave', e => { drop.style.borderColor = '#273057'; });
    drop.addEventListener('drop', async e => {
      e.preventDefault(); drop.style.borderColor = '#273057';
      const f = e.dataTransfer.files[0]; if (!f) return;
      svgText = await f.text();
      parseSize(svgText);
      info.textContent = `Loaded: ${f.name} (${svgW}×${svgH})`;
    });
    fileInput.addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      svgText = await f.text();
      parseSize(svgText);
      info.textContent = `Loaded: ${f.name} (${svgW}×${svgH})`;
    });

    function parseSize(text){
      // Try to read width/height or viewBox
      const wMatch = text.match(/width="(\d+)(px)?"/);
      const hMatch = text.match(/height="(\d+)(px)?"/);
      const vbMatch = text.match(/viewBox="([\d.\-\s]+)"/);
      if (wMatch && hMatch){ svgW = parseInt(wMatch[1],10); svgH = parseInt(hMatch[1],10); }
      else if (vbMatch){
        const vb = vbMatch[1].trim().split(/\s+/).map(Number);
        svgW = vb[2]; svgH = vb[3];
      }
    }

    btn.addEventListener('click', async () => {
      if (!svgText){ alert('Please load the SVG first.'); return; }
      const w = parseInt(widthInput.value || '1920', 10);
      const h = Math.round(svgH * (w / svgW));
      const q = parseFloat(qInput.value || '0.9');

      const svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgText);
      const img = new Image();
      img.onload = () => {
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        // Fill dark background to avoid transparent -> black artifacts
        ctx.fillStyle = '#0B1020'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        const jpg = canvas.toDataURL('image/jpeg', q);
        const a = Object.assign(document.createElement('a'), { href: jpg, download: 'solar-portfolio.jpg' });
        a.click();
      };
      img.onerror = () => alert('Could not render the SVG. Try opening the SVG in Figma and exporting to JPG.');
      img.src = svgUrl;
    });
  </script>
</body>
</html>
