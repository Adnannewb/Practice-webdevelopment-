<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Transformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>String Transformer</h1>
        <input type="text" placeholder="Enter your sentence with spaces" id="input">
        <div class="transform" >
            <Label>Lower Case: </Label>
            <span class="case" id="Lower-case"></span>
        </div>
        <div class="transform" >
            <Label>Upper Case: </Label>
            <span class="case" id="Upper-case"></span>
        </div>
        <div class="transform" >
            <Label>Capitalise Case: </Label>
            <span class="case" id="Capitalise"></span>
        </div>
        <div class="transform" >
            <Label>Reversed Case: </Label>
            <span class="case" id="Reversed-case"></span>
        </div>
        <div class="transform" >
            <Label>Camel Case: </Label>
            <span class="case" id="Camel-case"></span>
        </div>
        <div class="transform" >
            <Label>pascal Case: </Label>
            <span class="case" id="Pascal-case"></span>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
