<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doddle search Bar</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <img class="logo" src="Doodle Search.svg" alt="Doddle Search" />
      <div class="searchmenu">
        <div class="searchbar">
        <img class="searchicon" src="Vector.svg" alt="Search" />
        <input id="search" class="searchtext" type="text" />
        <img class="closeicon" src="Group 1.svg" alt="Close Icon" />
        <div class="suggestion-menu">
            <div class="topborder"></div>
            <p> <img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development in 3 months</p>
            <p> <img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development in 6 months</p>
            <p><img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development in 12 months</p>
            <p><img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development in a week</p>
            <p><img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development in 15 days</p>
            <p><img class="searchicon" src="Vector.svg" alt="Search" />can i learn web development on my own</p>
        </div>
      </div>
      </div>
    </div>
    <img src="doodle shapes.svg" alt="Doodle Shapes" class="shapes" />
    
  </body>
</html>
